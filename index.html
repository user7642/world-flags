<h1>🌍 Quốc Kỳ Các Quốc Gia</h1>

<div class="lang-switch">
  <button id="btn-vi" class="active" onclick="setLang('vi')">🔊 Nghe tiếng Việt</button>
  <button id="btn-en" onclick="setLang('en')">🔊 Nghe tiếng Anh</button>
</div>

<button class="acc-btn">🌏 Châu Á</button>

  <div class="grid" id="asia"></div>
</div>

<button class="acc-btn">🌍 Châu Âu</button>
<div class="acc-content">
  <div class="grid" id="europe"></div>
</div>

<button class="acc-btn">🌍 Châu Phi</button>
<div class="acc-content">
  <div class="grid" id="africa"></div>
</div>

<button class="acc-btn">🌎 Bắc Mỹ</button>

</div>

<button class="acc-btn">🌎 Nam Mỹ</button>
<div class="acc-content">
  <div class="grid" id="south-america"></div>
</div>

<button class="acc-btn">🌊 Châu Đại Dương</button>
<div class="acc-content">
  <div class="grid" id="oceania"></div>
</div>

<div class="guide">
  <span>👉 Bấm tiêu đề để mở / đóng</span>
  <span>🔊 Bấm lá cờ để nghe phát âm</span>
</div>

<audio id="audio"></audio>

<script src="./js/data.js"></script>
<script src="./js/app.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Đăng ký sw.js từ thư mục gốc
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('PWA đã sẵn sàng!'))
        .catch(err => console.log('Lỗi đăng ký PWA', err));
    });
  }
</script>
